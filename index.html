<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <title>Ucansi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body, html {
            height: 100%;
            height: 100dvh;
            background: black;
            color: white;
            overflow: hidden;
            width: 100%;
            position: fixed;
        }

        /* Conteneur de défilement vertical (Style TikTok) */
        .video-feed {
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* Force l'arrêt sur chaque vidéo */
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* Chaque "Slide" de vidéo */
        .video-slide {
            position: relative;
            width: 100%;
            height: 100%;
            height: 100dvh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            flex-direction: column;
        }

        .video-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            z-index: 2;
        }

        /* UI Fixe (Logo) */
        .header {
            position: fixed;
            top: calc(20px + var(--safe-top));
            width: 100%;
            text-align: center;
            z-index: 100;
        }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .logo span:first-child { color: #2E5BFF; }
        .logo span:last-child { color: #FF4D6D; }

        /* Boutons de droite - Dans le slide pour changer avec la vidéo */
        .side-bar {
            position: absolute;
            right: 15px;
            bottom: calc(110px + var(--safe-bottom));
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
            z-index: 20;
        }
        .action-btn { display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 600; text-shadow: 0 1px 5px rgba(0,0,0,0.8); }
        .icon-circle {
            width: 48px; height: 48px; border-radius: 50%;
            background: linear-gradient(135deg, #2E5BFF, #FF4D6D);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; margin-bottom: 4px; border: 2px solid rgba(255,255,255,0.2);
        }

        .avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid white; object-fit: cover; }

        /* Infos en bas */
        .bottom-info {
            position: absolute;
            left: 15px;
            bottom: calc(90px + var(--safe-bottom));
            max-width: 75%;
            z-index: 20;
        }
        .username { font-weight: bold; font-size: 17px; margin-bottom: 5px; }
        .description { font-size: 14px; line-height: 1.3; margin-bottom: 5px; }

        /* Barre de navigation basse - FIXE */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: calc(70px + var(--safe-bottom));
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            color: #666;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 12px;
            border-top: 1px solid #eee;
            z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 700; }
        .nav-active { color: #FF4D6D; }

        /* Masquer la barre de défilement */
        .video-feed::-webkit-scrollbar { display: none; }
        .video-feed { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><span>UCA</span><span>NSI</span></div>
    </div>

    <div class="video-feed">
        <!-- VIDEO 1 -->
        <div class="video-slide">
            <img class="video-bg" src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&q=80&w=1000" alt="v1">
            <div class="overlay"></div>
            <div class="side-bar">
                <img class="avatar" src="https://randomuser.me/api/portraits/women/44.jpg" alt="p1">
                <div class="action-btn"><div class="icon-circle"><i class="fas fa-heart"></i></div>1.2M</div>
                <div class="action-btn"><div class="icon-circle"><i class="fas fa-comment"></i></div>450</div>
                <div class="action-btn"><div class="icon-circle"><i class="fas fa-share"></i></div>Share</div>
            </div>
            <div class="bottom-info">
                <div class="username">@Sarah_Style <i class="fas fa-check-circle" style="color: #2E5BFF;"></i></div>
                <div class="description">New summer collection! #Fashion #Ucansi</div>
            </div>
        </div>

        <!-- VIDEO 2 -->
        <div class="video-slide">
            <img class="video-bg" src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&q=80&w=1000" alt="v2">
            <div class="overlay"></div>
            <div class="side-bar">
                <img class="avatar" src="https://randomuser.me/api/portraits/men/32.jpg" alt="p2">
                <div class="action-btn"><div class="icon-circle"><i class="fas fa-heart"></i></div>850K</div>
                <div class="action-btn"><div class="icon-circle"><i class="fas fa-comment"></i></div>1.2K</div>
                <div class="action-btn"><div class="icon-circle"><i class="fas fa-share"></i></div>Share</div>
            </div>
            <div class="bottom-info">
                <div class="username">@Marc_Travel <i class="fas fa-check-circle" style="color: #2E5BFF;"></i></div>
                <div class="description">Sunset in Paris is magic. #Travel #Love</div>
            </div>
        </div>

        <!-- VIDEO 3 -->
        <div class="video-slide">
            <img class="video-bg" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=1000" alt="v3">
            <div class="overlay"></div>
            <div class="side-bar">
                <img class="avatar" src="https://randomuser.me/api/portraits/women/68.jpg" alt="p3">
                <div class="action-btn"><div class="icon-circle"><i class="fas fa-heart"></i></div>2.5M</div>
                <div class="action-btn"><div class="icon-circle"><i class="fas fa-comment"></i></div>5.8K</div>
                <div class="action-btn"><div class="icon-circle"><i class="fas fa-share"></i></div>Share</div>
            </div>
            <div class="bottom-info">
                <div class="username">@Julie_Vibes</div>
                <div class="description">Weekend mood on! Let's chat. #Dating #Ucansi</div>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item nav-active"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item"><i class="far fa-heart"></i>Likes</div>
        <div class="nav-item"><i class="far fa-comment-dots"></i>Chat</div>
        <div class="nav-item"><i class="far fa-user"></i>Profile</div>
    </nav>

    <script>
        // Désactiver le rebond iOS
        document.addEventListener('touchmove', function (e) {
            if (e.target.closest('.video-feed')) return;
            e.preventDefault();
        }, { passive: false });
    </script>

</body>
</html>
