<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <title>Ucansi</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }

        body, html {
            height: 100%;
            height: 100dvh;
            background: black;
            color: white;
            overflow: hidden;
            width: 100%;
            position: fixed;
        }

        .video-feed {
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .video-slide {
            position: relative;
            width: 100%;
            height: 100dvh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .video-player {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            z-index: 2;
            pointer-events: none;
        }

        .header {
            position: fixed;
            top: calc(20px + var(--safe-top));
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); pointer-events: auto; }
        .logo span:first-child { color: #2E5BFF; }
        .logo span:last-child { color: #FF4D6D; }

        .side-bar {
            position: absolute;
            right: 15px;
            bottom: calc(110px + var(--safe-bottom));
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
            z-index: 20;
        }
        .action-btn { display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
        .action-btn:active { transform: scale(0.9); }

        .icon-circle {
            width: 48px; height: 48px; border-radius: 50%;
            background: linear-gradient(135deg, #2E5BFF, #FF4D6D);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; margin-bottom: 4px; border: 2px solid rgba(255,255,255,0.2);
        }

        .avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid white; object-fit: cover; }

        .bottom-info {
            position: absolute;
            left: 15px;
            bottom: calc(90px + var(--safe-bottom));
            max-width: 75%;
            z-index: 20;
            pointer-events: none;
        }
        .username { font-weight: bold; font-size: 17px; margin-bottom: 5px; pointer-events: auto; }
        .description { font-size: 14px; line-height: 1.3; margin-bottom: 5px; pointer-events: auto; }

        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: calc(70px + var(--safe-bottom));
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            color: #666;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 12px;
            border-top: 1px solid #eee;
            z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 700; cursor: pointer; }
        .nav-active { color: #FF4D6D !important; }

        .video-feed::-webkit-scrollbar { display: none; }
        .video-feed { -ms-overflow-style: none; scrollbar-width: none; }

        .liked i { color: #ff0000; animation: heartBeat 0.3s ease-in-out; }
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* Indicateur de chargement */
        .loading-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><span>UCA</span><span>NSI</span></div>
    </div>

    <div class="video-feed">
        <!-- VIDEO 1 -->
        <div class="video-slide">
            <div class="loading-overlay"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>
            <video class="video-player" loop playsinline muted>
                <source src="https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-lighting-in-the-night-city-2189-large.mp4" type="video/mp4">
            </video>
            <div class="overlay"></div>
            <div class="side-bar">
                <img class="avatar" src="https://randomuser.me/api/portraits/women/44.jpg" alt="p1">
                <div class="action-btn" onclick="toggleLike(this, '1.2M')">
                    <div class="icon-circle"><i class="fas fa-heart"></i></div>
                    <span class="count">1.2M</span>
                </div>
                <div class="action-btn">
                    <div class="icon-circle"><i class="fas fa-comment"></i></div>
                    450
                </div>
                <div class="action-btn" onclick="shareApp()">
                    <div class="icon-circle"><i class="fas fa-share"></i></div>
                    Share
                </div>
            </div>
            <div class="bottom-info">
                <div class="username">@Sarah_Neon <i class="fas fa-check-circle" style="color: #2E5BFF;"></i></div>
                <div class="description">Night vibes in the city. ✨ #Cyberpunk #Ucansi</div>
            </div>
        </div>

        <!-- VIDEO 2 -->
        <div class="video-slide">
            <div class="loading-overlay"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>
            <video class="video-player" loop playsinline muted>
                <source src="https://assets.mixkit.co/videos/preview/mixkit-winter-fashion-shoot-in-a-snowy-forest-34448-large.mp4" type="video/mp4">
            </video>
            <div class="overlay"></div>
            <div class="side-bar">
                <img class="avatar" src="https://randomuser.me/api/portraits/men/32.jpg" alt="p2">
                <div class="action-btn" onclick="toggleLike(this, '850K')">
                    <div class="icon-circle"><i class="fas fa-heart"></i></div>
                    <span class="count">850K</span>
                </div>
                <div class="action-btn">
                    <div class="icon-circle"><i class="fas fa-comment"></i></div>
                    1.2K
                </div>
                <div class="action-btn" onclick="shareApp()">
                    <div class="icon-circle"><i class="fas fa-share"></i></div>
                    Share
                </div>
            </div>
            <div class="bottom-info">
                <div class="username">@Forest_Model <i class="fas fa-check-circle" style="color: #2E5BFF;"></i></div>
                <div class="description">Winter collection is here! ❄️ #Fashion #Winter</div>
            </div>
        </div>

        <!-- VIDEO 3 -->
        <div class="video-slide">
            <div class="loading-overlay"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>
            <video class="video-player" loop playsinline muted>
                <source src="https://assets.mixkit.co/videos/preview/mixkit-young-woman-dancing-in-a-studio-4835-large.mp4" type="video/mp4">
            </video>
            <div class="overlay"></div>
            <div class="side-bar">
                <img class="avatar" src="https://randomuser.me/api/portraits/women/68.jpg" alt="p3">
                <div class="action-btn" onclick="toggleLike(this, '2.5M')">
                    <div class="icon-circle"><i class="fas fa-heart"></i></div>
                    <span class="count">2.5M</span>
                </div>
                <div class="action-btn">
                    <div class="icon-circle"><i class="fas fa-comment"></i></div>
                    5.8K
                </div>
                <div class="action-btn" onclick="shareApp()">
                    <div class="icon-circle"><i class="fas fa-share"></i></div>
                    Share
                </div>
            </div>
            <div class="bottom-info">
                <div class="username">@Julie_Dance</div>
                <div class="description">Let's dance together! 💃 #Dance #Ucansi</div>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item nav-active" onclick="switchTab(this)"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item" onclick="switchTab(this)"><i class="far fa-heart"></i>Likes</div>
        <div class="nav-item" onclick="switchTab(this)"><i class="far fa-comment-dots"></i>Chat</div>
        <div class="nav-item" onclick="switchTab(this)"><i class="far fa-user"></i>Profile</div>
    </nav>

    <script>
        // Gestion des vidéos au défilement (Intersection Observer)
        const options = {
            root: document.querySelector('.video-feed'),
            threshold: 0.6 // La vidéo doit être visible à 60% pour démarrer
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    video.play();
                } else {
                    video.pause();
                    video.currentTime = 0; // Remet à zéro quand on quitte la vidéo
                }
            });
        }, options);

        document.querySelectorAll('.video-slide').forEach(slide => {
            observer.observe(slide);
        });

        // Activer le son au premier clic n'importe où (Restriction Navigateurs)
        document.body.addEventListener('click', function() {
            document.querySelectorAll('video').forEach(v => {
                v.muted = false;
            });
        }, { once: true });

        function toggleLike(btn, count) {
            btn.classList.toggle('liked');
            let countSpan = btn.querySelector('.count');
            if(btn.classList.contains('liked')) {
                countSpan.innerText = "Liked!";
                setTimeout(() => { countSpan.innerText = count; }, 1000);
            } else {
                countSpan.innerText = count;
            }
        }

        function shareApp() {
            if (navigator.share) {
                navigator.share({
                    title: 'Ucansi App',
                    text: 'Regarde cette vidéo sur Ucansi !',
                    url: window.location.href
                }).catch(console.error);
            }
        }

        function switchTab(el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('nav-active'));
            el.classList.add('nav-active');
        }

        // Empêcher le rebond iOS sauf dans le feed
        document.addEventListener('touchmove', function (e) {
            if (e.target.closest('.video-feed')) return;
            e.preventDefault();
        }, { passive: false });
    </script>

</body>
</html>
