<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ucansi - Social Rainbow</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --rainbow: conic-gradient(#FF007F, #9D00FF, #007BFF, #00FBFF, #00FF88, #FFFF00, #FF8800, #FF007F);
            --pink: #FF007F;
            --purple: #9D00FF;
            --cyan: #00FBFF;
            --green: #2ECC71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: white; overflow: hidden; height: 100vh; width: 100vw; }

        /* --- LANDING PAGE --- */
        #landing-page {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .landing-logo {
            font-size: 50px; font-weight: 900; letter-spacing: 5px; margin-bottom: 40px;
            background: linear-gradient(to right, #FF007F, #007BFF, #FFFF00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .choice-btn {
            width: 280px; padding: 18px; border-radius: 15px; font-size: 16px; font-weight: bold;
            margin-bottom: 20px; cursor: pointer; border: none; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .web-btn { background: white; color: #000; }
        .apk-btn { background: var(--pink); color: white; text-decoration: none; }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-card { width: 85%; max-width: 400px; text-align: center; }
        input {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px;
            border: 1px solid #333; background: #111; color: white; outline: none;
        }
        .login-btn {
            width: 100%; padding: 15px; border-radius: 30px; border: 2px solid transparent;
            background-image: linear-gradient(#000, #000), var(--rainbow);
            background-origin: border-box; background-clip: content-box, border-box;
            color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 15px;
        }
        .google-btn {
            width: 100%; padding: 15px; border-radius: 30px; border: none;
            background: white; color: black; font-size: 16px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer;
        }

        /* --- MAIN APP / REELS --- */
        #main-app { display: none; height: 100vh; }
        .reels-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel { height: 100vh; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .top-bar { position: absolute; top: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 10; }
        .sidebar { position: absolute; right: 15px; bottom: 150px; display: flex; flex-direction: column; gap: 15px; align-items: center; z-index: 10; }

        .icon-wrap {
            width: 54px; height: 54px; border-radius: 50%; background: var(--rainbow);
            padding: 3px; display: flex; align-items: center; justify-content: center;
        }
        .icon-in { width: 100%; height: 100%; border-radius: 50%; background: black; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .rainbow-icon { background: var(--rainbow); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .money-btn { width: 45px; height: 45px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(0,0,0,0.8); display: flex; justify-content: space-around; align-items: center; z-index: 20;
        }
        .plus-btn {
            width: 60px; height: 60px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: black; font-size: 30px;
            position: relative; bottom: 15px; border: 3px solid transparent;
            background-image: linear-gradient(white, white), var(--rainbow); background-origin: border-box; background-clip: content-box, border-box;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .hidden { display: none !important; }
        .glow { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(157,0,255,0.2), transparent 70%); filter: blur(50px); pointer-events: none; }
    </style>
</head>
<body>

    <!-- LANDING -->
    <div id="landing-page">
        <div class="landing-logo">UCANSI</div>
        <button class="choice-btn web-btn" onclick="showLogin()">
            <i class="fas fa-globe"></i> Continuer sur le Web
        </button>
        <a href="app-debug.apk" download class="choice-btn apk-btn">
            <i class="fab fa-android"></i> Télécharger l'APK
        </a>
    </div>

    <!-- LOGIN -->
    <div id="login-screen" class="hidden">
        <div class="glow"></div>
        <div class="login-card">
            <div class="landing-logo">UCANSI</div>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Mot de passe">
            <button class="login-btn" onclick="startApp()">Se connecter</button>
            <div style="margin: 15px 0; color: #555;">OU</div>
            <button class="google-btn" onclick="startApp()">
                <i class="fab fa-google"></i> Continuer avec Google
            </button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app">
        <div class="top-bar">
            <i class="fas fa-arrow-left"></i>
            <span style="font-weight: bold;">Eledji com.</span>
            <div style="background: red; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">Live</div>
        </div>

        <div class="reels-container" id="reels">
            <div class="reel">
                <video loop playsinline muted src="https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-lighting-in-the-night-city-2189-large.mp4"></video>
                <div class="sidebar">
                    <div class="money-btn">$</div>
                    <div class="icon-wrap"><div class="icon-in"><i class="fas fa-heart rainbow-icon"></i></div></div>
                    <div class="icon-wrap"><div class="icon-in"><i class="fas fa-comment rainbow-icon"></i></div></div>
                    <div class="icon-wrap"><div class="icon-in"><i class="fas fa-share rainbow-icon"></i></div></div>
                </div>
                <div style="position: absolute; bottom: 120px; left: 20px;">
                    <div style="font-weight: bold; font-size: 18px;">@Sarah_Neon</div>
                    <div style="font-size: 14px;">Vivez en couleurs ! 🌈 #Rainbow</div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div style="color: white; opacity: 1;">Accueil</div>
            <div style="opacity: 0.6;">Découvrir</div>
            <div class="plus-btn"><i class="fas fa-plus"></i></div>
            <div style="opacity: 0.6;">Messages</div>
            <div style="opacity: 0.6;">Compte</div>
        </nav>
    </div>

    <script>
        function showLogin() {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }

        function startApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').style.display = 'block';
            document.querySelector('video').play();
        }

        // Observer pour Play/Pause
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting && document.getElementById('main-app').style.display === 'block') {
                    video.play();
                } else {
                    video.pause();
                }
            });
        }, { threshold: 0.8 });

        document.querySelectorAll('.reel').forEach(reel => observer.observe(reel));

        document.body.addEventListener('click', () => {
            document.querySelectorAll('video').forEach(v => v.muted = false);
        }, { once: true });
    </script>
</body>
</html>
