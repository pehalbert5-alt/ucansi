<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ucansi Rainbow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --rainbow: conic-gradient(#FF007F, #9D00FF, #007BFF, #00FBFF, #00FF88, #FFFF00, #FF8800, #FF007F);
            --pink: #FF007F;
            --purple: #9D00FF;
            --cyan: #00FBFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body { background: #050505; color: white; overflow: hidden; height: 100vh; }

        /* Logo Arc-en-ciel */
        .header { position: fixed; top: 50px; width: 100%; text-align: center; z-index: 100; }
        .logo {
            font-size: 30px; font-weight: 900; letter-spacing: 4px;
            background: linear-gradient(to right, #FF007F, #007BFF, #FFFF00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Boutons de droite Arc-en-ciel */
        .side-bar {
            position: fixed; right: 15px; bottom: 120px;
            display: flex; flex-direction: column; gap: 20px; align-items: center;
        }

        .icon-wrapper {
            width: 54px; height: 54px; border-radius: 50%;
            background: var(--rainbow);
            display: flex; align-items: center; justify-content: center;
            padding: 3px;
        }

        .icon-inner {
            width: 100%; height: 100%; border-radius: 50%;
            background: black;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }

        /* Icônes avec texte dégradé */
        .rainbow-icon {
            background: var(--rainbow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .count { font-size: 12px; font-weight: bold; margin-top: 4px; }

        /* Profil avec Plus */
        .profile-box { position: relative; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #333; border: 2px solid white; }
        .plus-btn {
            position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
            background: var(--pink); width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }

        /* Barre de navigation */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: black; display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #222;
        }
        .nav-item { color: white; text-align: center; font-size: 11px; text-decoration: none; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }

        .active-feed {
            width: 40px; height: 40px; background: var(--rainbow);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">UCANSI</div>
    </div>

    <div class="side-bar">
        <div class="profile-box">
            <div class="avatar"></div>
            <div class="plus-btn">+</div>
        </div>

        <div class="action-btn">
            <div class="icon-wrapper">
                <div class="icon-inner"><i class="fas fa-heart rainbow-icon"></i></div>
            </div>
            <div class="count">1.2M</div>
        </div>

        <div class="action-btn">
            <div class="icon-wrapper">
                <div class="icon-inner"><i class="fas fa-comment rainbow-icon"></i></div>
            </div>
            <div class="count">12.5K</div>
        </div>

        <div class="action-btn">
            <div class="icon-wrapper">
                <div class="icon-inner"><i class="fas fa-share rainbow-icon"></i></div>
            </div>
            <div class="count">102</div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item">
            <div class="active-feed"><i class="fas fa-play"></i></div>
            Feed
        </div>
        <div class="nav-item" style="color: var(--pink);"><i class="fas fa-heart"></i>Likes</div>
        <div class="nav-item" style="color: var(--purple);"><i class="fas fa-comment"></i>Chat</div>
        <div class="nav-item" style="color: var(--cyan);"><i class="fas fa-user"></i>Profil</div>
    </nav>

</body>
</html>
