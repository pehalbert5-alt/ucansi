<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ucansi - Connexion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --rainbow: conic-gradient(#FF007F, #9D00FF, #007BFF, #00FBFF, #00FF88, #FFFF00, #FF8800, #FF007F);
            --pink: #FF007F;
            --purple: #9D00FF;
        }

        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .login-container { width: 85%; max-width: 400px; text-align: center; z-index: 10; }

        .logo {
            font-size: 48px; font-weight: 900; letter-spacing: 4px; margin-bottom: 30px;
            background: linear-gradient(to right, #FF007F, #007BFF, #FFFF00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        input {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px;
            border: 1px solid #444; background: #111; color: white; outline: none;
        }

        .login-btn {
            width: 100%; padding: 15px; border-radius: 30px; border: 2px solid transparent;
            background-image: linear-gradient(#000, #000), var(--rainbow);
            background-origin: border-box; background-clip: content-box, border-box;
            color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 20px;
        }

        .separator { display: flex; align-items: center; color: #666; font-size: 12px; margin-bottom: 20px; }
        .separator::before, .separator::after { content: ""; flex: 1; height: 1px; background: #333; margin: 0 10px; }

        .google-btn {
            width: 100%; padding: 15px; border-radius: 30px; border: none;
            background: white; color: black; font-size: 16px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            gap: 10px;
        }

        .glow { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(157,0,255,0.2) 0%, transparent 70%); filter: blur(50px); z-index: 1; }

        .hidden { display: none !important; }
        #feed-ui { width: 100vw; height: 100vh; position: relative; }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="login-container" id="login-screen">
        <div class="logo">UCANSI</div>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Mot de passe">
        <button class="login-btn" onclick="login()">Se connecter</button>

        <div class="separator">OU</div>

        <button class="google-btn" onclick="login()">
            <i class="fab fa-google"></i> Continuer avec Google
        </button>

        <p style="margin-top: 20px; color: #888; font-size: 14px;">Créer un compte</p>
    </div>

    <!-- Le reste de l'UI feed... -->
    <div id="feed-ui" class="hidden">
        <!-- (UI de feed simplifiée pour la démo) -->
        <div style="width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center;">
            <h2 class="logo" style="font-size: 24px;">Connecté ! 🚀</h2>
        </div>
    </div>

    <script>
        function login() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('feed-ui').classList.remove('hidden');
            // Redirection vers le flux réel ici si nécessaire
        }
    </script>
</body>
</html>
