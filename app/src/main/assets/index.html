<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ucansi Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --rainbow: conic-gradient(#FF007F, #9D00FF, #007BFF, #00FBFF, #00FF88, #FFFF00, #FF8800, #FF007F);
            --green: #2ECC71;
        }

        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* Top Header */
        .top-bar {
            position: fixed; top: 45px; width: 100%; display: flex;
            justify-content: space-between; align-items: center; padding: 0 20px; z-index: 10;
        }
        .live-tag { background: red; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }

        /* Sidebar Icons */
        .sidebar {
            position: fixed; right: 15px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; align-items: center;
        }
        .money-btn {
            width: 45px; height: 45px; background: var(--green); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold;
        }
        .social-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .wa { background: #25D366; }
        .ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

        /* Floating Comments */
        .comments { position: fixed; bottom: 120px; left: 20px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { background: rgba(0,0,0,0.5); padding: 6px 15px; border-radius: 20px; font-size: 14px; color: #FFD700; }

        /* Bottom Nav & Rainbow Plus */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(0,0,0,0.8); display: flex; justify-content: space-around; align-items: center;
            padding: 0 10px; font-size: 12px;
        }
        .nav-item { opacity: 0.6; }
        .active { opacity: 1; }

        .plus-container {
            position: absolute; left: 50%; top: -15px; transform: translateX(-50%);
            width: 65px; height: 65px; display: flex; align-items: center; justify-content: center;
        }
        .plus-glow {
            position: absolute; width: 100%; height: 100%;
            background: var(--rainbow); border-radius: 50%; filter: blur(8px);
        }
        .plus-btn {
            position: relative; width: 55px; height: 55px; background: white;
            border-radius: 50%; border: 3px solid transparent;
            background-image: linear-gradient(white, white), var(--rainbow);
            background-origin: border-box; background-clip: content-box, border-box;
            display: flex; align-items: center; justify-content: center;
            color: black; font-size: 30px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <i class="fas fa-arrow-left"></i>
        <span>Eledji com.</span>
        <div class="live-tag">Live</div>
    </div>

    <div class="sidebar">
        <div class="money-btn">$</div>
        <div class="money-btn">$</div>
        <i class="far fa-heart" style="font-size: 28px;"></i>
        <i class="far fa-comment" style="font-size: 28px;"></i>
        <i class="fas fa-share" style="font-size: 28px;"></i>
        <div class="social-btn wa"><i class="fab fa-whatsapp"></i></div>
        <div class="social-btn ig"><i class="fab fa-instagram"></i></div>
    </div>

    <div class="comments">
        <div class="bubble">Wow! ❤️🔥</div>
        <div class="bubble">Dere! ❤️🥰</div>
        <div style="font-size: 14px; padding-left: 10px;">So cool.</div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active">Accueil</div>
        <div class="nav-item">Découvrir</div>
        <div class="plus-container">
            <div class="plus-glow"></div>
            <div class="plus-btn"><i class="fas fa-plus"></i></div>
        </div>
        <div class="nav-item">Messages</div>
        <div class="nav-item">Compte</div>
    </nav>

</body>
</html>
